<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelter Survivor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Notification offline -->
<div id="offline-notif" style="display:none">
  <span id="offline-msg"></span>
  <div style="display:flex;gap:6px">
    <button onclick="window.collectOfflineUI(1)">Collecter</button>
    <button class="btn-danger" onclick="window.collectOfflineUI(2)">×2 — 5 ☢</button>
  </div>
</div>

<!-- HUD -->
<header id="hud">
  <div class="hud-title">☣ SHELTER</div>
  <div class="res"><span class="res-dot cap">💊</span><span id="d-capsules">0</span></div>
  <div class="res"><span class="res-dot rad">☢</span><span id="d-radium">0</span></div>
  <div class="res"><span class="res-dot dna">🧬</span><span id="d-dna">0</span></div>
  <div id="acc-bar">
    <span id="acc-lvl-badge">1</span>
    <div id="acc-xp-bar"><div id="acc-xp-fill"></div></div>
  </div>
  <div id="idle-display">Idle: +0 caps/s</div>
</header>

<!-- Navigation -->
<nav id="tabs">
  <button class="tab active" data-tab="combat"    onclick="window.setTab('combat')">⚔ Combat</button>
  <button class="tab"        data-tab="survivors" onclick="window.setTab('survivors')">👥 Équipe</button>
  <button class="tab"        data-tab="packs"     onclick="window.setTab('packs')">📡 Signaux</button>
  <button class="tab"        data-tab="tower"     onclick="window.setTab('tower')">🗺 Zones</button>
  <button class="tab"        data-tab="talents"   onclick="window.setTab('talents')">⭐ Talents</button>
  <button class="tab"        data-tab="daily"     onclick="window.setTab('daily')">📋 Rapports</button>
</nav>

<!-- ══ COMBAT ══ -->
<div class="view" data-view="combat">

  <!-- Frise de vagues -->
  <div id="wave-frise"></div>

  <!-- Infos zone + vague -->
  <div class="zone-bar">
    <div id="zone-name" style="font-size:13px;font-weight:500">Zone 1</div>
    <div style="font-size:12px;color:var(--text-muted)">Vague <span id="wave-num">1</span>/11</div>
  </div>

  <!-- Boss panel -->
  <div id="boss-panel">
    <div class="boss-inner">
      <div>
        <div id="boss-name">Boss</div>
        <div id="boss-desc"></div>
      </div>
      <div style="text-align:right;min-width:120px">
        <div id="boss-hp-bar-track"><div id="boss-hp-bar-fill" style="width:100%"></div></div>
        <div id="boss-hp-text">100/100 PV</div>
      </div>
    </div>
  </div>

  <!-- Phase 1 : Pré-combat (sélection + lancement) -->
  <div id="precombat-panel"></div>

  <!-- Phase 2 : Combat animé -->
  <div id="combat-panel" style="display:none"></div>

  <!-- Phase 3 : Résultat -->
  <div id="result-panel" style="display:none"></div>

  <!-- Log -->
  <div id="log"></div>

  <!-- Équipe rapide (slots) -->
  <div class="team-card">
    <div class="card-title">Équipe active</div>
    <div id="team-slots"></div>
    <div id="team-info" style="font-size:11px;color:var(--text-muted);margin-top:4px"></div>
  </div>

</div>

<!-- ══ SURVIVANTS ══ -->
<div class="view" data-view="survivors" style="display:none">
  <div id="survivor-collection"></div>
  <div id="album-stats"></div>
</div>

<!-- ══ SIGNAUX (GACHA) ══ -->
<div class="view" data-view="packs" style="display:none">
  <div id="pity-display"></div>
  <div id="pack-buttons"></div>
  <div id="drop-rates"></div>
  <div id="pack-modal" style="display:none">
    <div id="pack-modal-box">
      <div id="pack-stage"></div>
      <div id="pack-disc"></div>
      <div id="pack-reveal"></div>
      <button id="pack-close" style="display:none" onclick="window.closePackModal()">Intégrer à la base !</button>
    </div>
  </div>
</div>

<!-- ══ ZONES ══ -->
<div class="view" data-view="tower" style="display:none">
  <div id="tower-container"></div>
</div>

<!-- ══ TALENTS ══ -->
<div class="view" data-view="talents" style="display:none">
  <div id="talent-points-display"></div>
  <div id="talent-grid"></div>
</div>

<!-- ══ RAPPORTS JOURNALIERS ══ -->
<div class="view" data-view="daily" style="display:none">
  <div id="daily-rewards"></div>
  <div id="daily-btn-wrap" style="margin:8px 0">
    <span id="daily-status" style="font-size:12px;color:var(--text-muted)"></span>
  </div>
  <div id="missions-list"></div>
</div>

<!-- Modal fiche survivant -->
<div id="survivor-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
